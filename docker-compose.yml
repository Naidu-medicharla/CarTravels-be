version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cartravels_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env          # loads DATABASE_URL, JWT_*, ORS_API_KEY, etc.
    environment:
      - PORT=8000
    volumes:
      # Persist uploaded car images between container restarts
      - car_images:/app/uploads/car_images
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  car_images:
    driver: local
